<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - My Secret Book</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--cream:#eadbc4;
--cream-soft:#f4ecdf;
--gold:#d09a36;
--brown:#4b2d1a;
--card:rgba(255,250,242,0.92);
--border:rgba(208,154,54,0.28);
--btn1:#a22f24;
--btn2:#62130e;
}

body{
background:linear-gradient(180deg,var(--cream-soft),var(--cream));
font-family:"Poppins",sans-serif;
color:var(--brown);
}

/* NAV */
.nav{
width:95%;
margin:15px auto;
display:flex;
justify-content:space-between;
padding:10px;
border-radius:999px;
background:rgba(255,248,237,.4);
}

.nav a{
padding:8px 14px;
text-decoration:none;
color:var(--gold);
}

/* PROFILE */
.profile{
width:90%;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
}

.btn{
padding:10px;
border:none;
margin:5px;
border-radius:20px;
background:linear-gradient(var(--btn1),var(--btn2));
color:white;
cursor:pointer;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN PROTECTION -->
<script>
if(!localStorage.getItem("loggedInUser")){
location.replace("login.html");
}
</script>

<div class="nav">
<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
</div>

<div>
<a href="#" id="logoutBtn">Logout</a>
</div>
</div>

<div class="profile">

<h2 id="nameText">Prabhat</h2>
<p id="idText">Prabhat@mysecretbook</p>
<p id="aboutText">About me...</p>

<hr><br>

<div id="editBox" style="display:none;">
<input id="nameInput" placeholder="Name">
<input id="idInput" placeholder="Profile ID">
<textarea id="aboutInput" placeholder="About"></textarea>
</div>

<select id="privacy">
<option value="private">Private</option>
<option value="public">Public</option>
</select>

<br><br>

<button class="btn" id="editBtn">Edit</button>
<button class="btn" id="saveBtn">Save</button>
<button class="btn" id="logoutBtn2">Logout</button>

</div>

<script>

/* ELEMENTS */
const nameText = document.getElementById("nameText");
const idText = document.getElementById("idText");
const aboutText = document.getElementById("aboutText");

const nameInput = document.getElementById("nameInput");
const idInput = document.getElementById("idInput");
const aboutInput = document.getElementById("aboutInput");

const editBox = document.getElementById("editBox");

const editBtn = document.getElementById("editBtn");
const saveBtn = document.getElementById("saveBtn");

const logoutBtn = document.getElementById("logoutBtn");
const logoutBtn2 = document.getElementById("logoutBtn2");

const privacy = document.getElementById("privacy");

/* LOAD DATA */
function load(){
let data = JSON.parse(localStorage.getItem("profile")) || {};

nameText.innerText = data.name || "Prabhat";
idText.innerText = data.id || "Prabhat@mysecretbook";
aboutText.innerText = data.about || "About me...";

privacy.value = data.privacy || "private";

nameInput.value = data.name || "";
idInput.value = data.id || "";
aboutInput.value = data.about || "";
}

/* EDIT */
editBtn.onclick = ()=>{
editBox.style.display = "block";
};

/* SAVE */
saveBtn.onclick = ()=>{
let data = {
name: nameInput.value,
id: idInput.value,
about: aboutInput.value,
privacy: privacy.value
};

localStorage.setItem("profile", JSON.stringify(data));
load();
editBox.style.display="none";
alert("Saved");
};

/* LOGOUT */
function logout(){
localStorage.removeItem("loggedInUser");
location.replace("login.html");
}

logoutBtn.onclick = logout;
logoutBtn2.onclick = logout;

/* INIT */
load();

</script>

</body>
</html>
