  ta: "My Secret Book இற்கு வரவேற்கிறோம் ✨<br>இது உங்கள் தனிப்பட்ட இடம் 💛 மகிழ்ச்சியாக இருங்கள்।",

  ml: "My Secret Book ലേക്ക് സ്വാഗതം ✨<br>ഇത് നിങ്ങളുടെ സ്വകാര്യ ഇടമാണ് 💛 സന്തോഷത്തോടെ ഇരിക്കുക।",

  kn: "My Secret Book ಗೆ ಸ್ವಾಗತ ✨<br>ಇದು ನಿಮ್ಮ ವೈಯಕ್ತಿಕ ಸ್ಥಳ 💛 ಸಂತೋಷವಾಗಿರಿ।",

  gu: "My Secret Book માં આપનું સ્વાગત છે ✨<br>આ તમારું વ્યક્તિગત સ્થાન 💛 ખુશ રહો।",

  pa: "My Secret Book ਵਿੱਚ ਤੁਹਾਡਾ ਸਵਾਗਤ ਹੈ ✨<br>ਇਹ ਤੁਹਾਡੀ ਨਿੱਜੀ ਜਗ੍ਹਾ 💛 ਖੁਸ਼ ਰਹੋ।",

  mr: "My Secret Book मध्ये स्वागत आहे ✨<br>हे तुमचं वैयक्तिक ठिकाण 💛 आनंदी रहा।",

  ur: "My Secret Book میں خوش آمدید ✨<br>یہ آپ کی ذاتی جگہ ہے 💛 خوش رہیں۔"
};

const text = document.getElementById("about-text");
const select = document.getElementById("langSelect");

// 🔥 AUTO LOAD LANGUAGE
function loadLanguage() {
  let savedLang = localStorage.getItem("lang");

  if (!savedLang) {
    savedLang = navigator.language.slice(0,2); // auto detect
  }

  if (!translations[savedLang]) {
    savedLang = "en";
  }

  text.innerHTML = translations[savedLang];
  select.value = savedLang;
}

// 🔥 CHANGE LANGUAGE
select.addEventListener("change", () => {
  let lang = select.value;
  text.innerHTML = translations[lang];
  localStorage.setItem("lang", lang);
});

// LOAD ON START
loadLanguage();

</script>
<script>
const data = {

or: {

}

};

function changeLang(lang) {
document.getElementById("about-text").innerHTML = data[lang].text;
document.getElementById("greet").innerText = data[lang].greet;
localStorage.setItem("lang", lang);
}

function loadLang() {
let lang = localStorage.getItem("lang") || "en";
changeLang(lang);
}

window.onload = loadLang;
</script>
