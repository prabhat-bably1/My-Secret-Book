<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About - My Secret Book</title>
<link rel="stylesheet" href="about.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="/My-Secret-Book/index.html">Home</a>
  <a href="/My-Secret-Book/about.html">About</a>
  <a href="/My-Secret-Book/login.html">Login 🔐</a>
</div>

<!-- TITLE -->
<h1 class="title">My Secret Book</h1>

<!-- LANGUAGE SELECT -->
<div class="languages">
  <select id="langSelect" onchange="changeLang(this.value)">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="or">Odia</option>
    <option value="bn">Bengali</option>
    <option value="ta">Tamil</option>
    <option value="te">Telugu</option>
    <option value="ml">Malayalam</option>
    <option value="kn">Kannada</option>
    <option value="gu">Gujarati</option>
    <option value="pa">Punjabi</option>
    <option value="mr">Marathi</option>
    <option value="ur">Urdu</option>
  </select>
</div>

  <div class="about-box">

  <h2 class="about-title">About</h2>

  <h3 id="greet">Hi / Hello Dear ✨</h3>

  <p id="about-text">
  </p>

  </div>

<!-- SCRIPT -->
<script>

const data = {
  en: {
    greet: "Hi / Hello Dear ✨",
    text: "My Secret Book is your personal digital space..."
  },
  hi: {
    greet: "नमस्ते प्रिय ✨",
    text: "My Secret Book आपका व्यक्तिगत डिजिटल स्थान है..."
  },
  or: {
    greet: "ନମସ୍କାର ପ୍ରିୟ ✨",
    text: "My Secret Book ଆପଣଙ୍କର ଏକ ବ୍ୟକ୍ତିଗତ ସ୍ଥାନ..."
  }
};

function changeLang(lang) {
  document.getElementById("about-text").innerHTML = data[lang].text;
  document.getElementById("greet").innerText = data[lang].greet;
  localStorage.setItem("lang", lang);
}

function loadLang() {
  let lang = localStorage.getItem("lang") || "en";
  changeLang(lang);
  document.getElementById("langSelect").value = lang; // 👈 yahi add karna tha
}

// 👇 ye bhi hona chahiye
document.getElementById("langSelect").addEventListener("change", function() {
  changeLang(this.value);
});

// 👇 page load pe run hoga
loadLang();

</script>
</body>
</html>
