<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - My Secret Book</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script>
    if (localStorage.getItem("msb_admin_logged_in") !== "true") {
      window.location.replace("admin-login.html");
    }
  </script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --cream:#eadbc4;
      --cream-soft:#f4ecdf;
      --gold:#d09a36;
      --brown:#4b2d1a;
      --card:rgba(255,250,242,0.92);
      --border:rgba(208,154,54,0.28);
      --btn1:#a22f24;
      --btn2:#62130e;
      --green:#2f7a49;
      --blue:#385f9b;
      --rose1:#d45a78;
      --rose2:#f0a2b5;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:linear-gradient(180deg,var(--cream-soft),var(--cream));
      font-family:"Poppins",sans-serif;
      color:var(--brown);
    }

    body{
      position:relative;
    }

    .petals{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:1;
    }

    .petal{
      position:absolute;
      top:-80px;
      width:18px;
      height:26px;
      border-radius:70% 30% 70% 30%;
      opacity:.82;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.10));
      animation:fall linear infinite;
    }

    .petal::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(180deg,var(--rose2),var(--rose1));
      transform:rotate(18deg);
    }

    .petal:nth-child(1){left:5%;animation-duration:13s;animation-delay:-2s;}
    .petal:nth-child(2){left:13%;animation-duration:16s;animation-delay:-8s;}
    .petal:nth-child(3){left:22%;animation-duration:12s;animation-delay:-4s;}
    .petal:nth-child(4){left:31%;animation-duration:18s;animation-delay:-10s;}
    .petal:nth-child(5){left:40%;animation-duration:15s;animation-delay:-1s;}
    .petal:nth-child(6){left:49%;animation-duration:17s;animation-delay:-6s;}
    .petal:nth-child(7){left:58%;animation-duration:14s;animation-delay:-9s;}
    .petal:nth-child(8){left:67%;animation-duration:19s;animation-delay:-11s;}
    .petal:nth-child(9){left:76%;animation-duration:13s;animation-delay:-3s;}
    .petal:nth-child(10){left:85%;animation-duration:16s;animation-delay:-7s;}
    .petal:nth-child(11){left:92%;animation-duration:18s;animation-delay:-12s;}

    @keyframes fall{
      0%{transform:translateY(-80px) translateX(0) rotate(0deg);}
      25%{transform:translateY(25vh) translateX(18px) rotate(90deg);}
      50%{transform:translateY(50vh) translateX(-14px) rotate(180deg);}
      75%{transform:translateY(75vh) translateX(20px) rotate(260deg);}
      100%{transform:translateY(110vh) translateX(-10px) rotate(340deg);}
    }

    .page{
      position:relative;
      z-index:2;
      width:100%;
      padding:16px 14px 40px;
    }

    .nav{
      width:min(1180px,96vw);
      margin:0 auto 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(255,248,237,.34);
      border:1px solid rgba(208,154,54,.24);
      box-shadow:
        0 10px 20px rgba(0,0,0,.06),
        inset 0 0 0 1px rgba(255,255,255,.16);
      backdrop-filter:blur(6px);
    }

    .nav-group{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav a,
    .nav button{
      text-decoration:none;
      padding:10px 18px;
      border-radius:999px;
      color:var(--gold);
      font-family:"Cinzel",serif;
      font-size:.84rem;
      border:1px solid rgba(208,154,54,.32);
      background:rgba(60,25,10,.08);
      transition:.2s ease;
      cursor:pointer;
    }

    .nav a:hover,
    .nav button:hover{
      transform:translateY(-2px);
      color:#fff2ca;
      background:rgba(96,40,14,.28);
    }

    .title-wrap{
      text-align:center;
      margin:4px 0 10px;
    }

    .title{
      position:relative;
      display:inline-block;
      font-family:"Great Vibes",cursive;
      font-size:clamp(3rem,8vw,6.2rem);
      line-height:1.03;
      color:var(--gold);
      text-shadow:
        0 1px 0 #fff6da,
        0 0 10px rgba(255,223,140,.42),
        0 0 20px rgba(207,154,53,.22),
        0 6px 18px rgba(90,55,20,.16);
    }

    .ornament{
      width:min(860px,95vw);
      margin:10px auto 0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .orn-line{
      flex:1;
      height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),#fff1c9,var(--gold),transparent);
      box-shadow:0 0 10px rgba(200,150,60,.16);
    }

    .orn-center{
      color:#ab7428;
      font-size:1rem;
      white-space:nowrap;
      font-family:"Cinzel",serif;
    }

    .admin-wrap{
      width:min(1180px,96vw);
      margin:18px auto 0;
      display:grid;
      gap:18px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
    }

    .stat-card,
    .panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:0 24px 36px rgba(0,0,0,.08), inset 0 0 0 1px rgba(255,255,255,.22);
      backdrop-filter:blur(10px);
    }

    .stat-card{
      padding:18px;
    }

    .stat-title{
      font-family:"Cinzel",serif;
      font-size:.95rem;
      color:#7a3520;
      margin-bottom:8px;
    }

    .stat-value{
      font-size:2rem;
      font-weight:700;
      color:#5b2a19;
    }

    .panel{
      padding:18px;
    }

    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .panel-title{
      font-family:"Cinzel",serif;
      font-size:1.3rem;
      color:#6d2418;
    }

    .search-box{
      width:min(340px,100%);
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(208,154,54,.24);
      background:rgba(255,252,247,.92);
      color:#4b2d1a;
      font-size:.95rem;
      outline:none;
    }

    .user-list{
      display:grid;
      gap:12px;
    }

    .user-card{
      padding:16px;
      border-radius:18px;
      background:rgba(255,248,238,.78);
      border:1px solid rgba(208,154,54,.18);
      display:grid;
      gap:10px;
    }

    .user-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .user-name{
      font-family:"Cinzel",serif;
      font-size:1.1rem;
      color:#7a3520;
    }

    .user-id,
    .user-meta{
      color:#6c4630;
      font-size:.92rem;
      line-height:1.7;
      word-break:break-word;
    }

    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:.78rem;
      font-weight:600;
      border:1px solid rgba(208,154,54,.22);
      background:rgba(255,247,232,.84);
      color:#7c4b23;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding:10px 14px;
      border-radius:999px;
      color:#fff4e2;
      font-family:"Cinzel",serif;
      font-size:.9rem;
      border:2px solid var(--gold);
      box-shadow:0 10px 16px rgba(0,0,0,.10);
    }

    .btn-danger{
      background:linear-gradient(180deg,var(--btn1) 0%, #761b13 55%, var(--btn2) 100%);
    }

    .btn-green{
      background:linear-gradient(180deg,#3f8f5c 0%, #2f7a49 100%);
    }

    .btn-blue{
      background:linear-gradient(180deg,#4a77bc 0%, #385f9b 100%);
    }

    .empty-note{
      color:#8b6547;
      font-size:.95rem;
      line-height:1.7;
      padding:10px 2px;
    }

    .danger-note{
      color:#8b2c1f;
      font-size:.92rem;
      line-height:1.7;
    }

    @media (max-width: 900px){
      .stats{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width: 600px){
      .nav{
        padding:10px;
      }

      .nav a,
      .nav button{
        padding:8px 12px;
        font-size:.78rem;
      }

      .stats{
        grid-template-columns:1fr;
      }

      .title{
        font-size:clamp(2.8rem,8vw,4.8rem);
      }
    }

    @media (max-width: 420px){
      .page{
        padding:14px 10px 28px;
      }

      .nav{
        width:96vw;
        padding:8px;
      }

      .nav a,
      .nav button{
        padding:7px 10px;
        font-size:.72rem;
      }

      .title{
        font-size:clamp(2.45rem,8vw,4rem);
      }
    }
  </style>
</head>
<body>
  <div class="petals">
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
  </div>

  <div class="page">
    <div class="nav">
      <div class="nav-group">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
      </div>

      <div class="nav-group">
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <div class="title-wrap">
      <div class="title">My Secret Book Admin</div>
      <div class="ornament">
        <div class="orn-line"></div>
        <div class="orn-center">❦ ADMIN PANEL ❦</div>
        <div class="orn-line"></div>
      </div>
    </div>

    <div class="admin-wrap">
      <section class="stats">
        <div class="stat-card">
          <div class="stat-title">Total Users</div>
          <div class="stat-value" id="totalUsers">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Total Secrets</div>
          <div class="stat-value" id="totalSecrets">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Total Images</div>
          <div class="stat-value" id="totalImages">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Admin Status</div>
          <div class="stat-value" style="font-size:1.2rem;">Active</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">All Users</div>
            <div class="danger-note">Delete karne par user account list se hat jayega. User ke saved secrets/images local browser storage me reh sakte hain agar same device me save hue hon.</div>
          </div>

          <input type="text" id="searchInput" class="search-box" placeholder="Search by email, name, phone or secret ID">
        </div>

        <div class="actions" style="margin-bottom:16px;">
          <button class="btn btn-blue" id="clearSessionBtn" type="button">Clear Logged In User</button>
          <button class="btn btn-green" id="exportUsersBtn" type="button">Export Users JSON</button>
        </div>

        <div class="user-list" id="userList"></div>
      </section>
    </div>
  </div>

  <script>
    const totalUsers = document.getElementById("totalUsers");
    const totalSecrets = document.getElementById("totalSecrets");
    const totalImages = document.getElementById("totalImages");
    const userList = document.getElementById("userList");
    const searchInput = document.getElementById("searchInput");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const clearSessionBtn = document.getElementById("clearSessionBtn");
    const exportUsersBtn = document.getElementById("exportUsersBtn");

    function getUsers() {
      return JSON.parse(localStorage.getItem("msb_users") || "[]");
    }

    function saveUsers(users) {
      localStorage.setItem("msb_users", JSON.stringify(users));
    }

    function getSecrets() {
      return JSON.parse(localStorage.getItem("msb_words") || "[]");
    }

    function getImages() {
      return JSON.parse(localStorage.getItem("msb_images") || "[]");
    }

    function updateStats() {
      totalUsers.textContent = getUsers().length;
      totalSecrets.textContent = getSecrets().length;
      totalImages.textContent = getImages().length;
    }

    function renderUsers() {
      const users = getUsers();
      const query = searchInput.value.trim().toLowerCase();

      const filteredUsers = users.filter(user => {
        const text = [
          user.firstName || "",
          user.middleName || "",
          user.email || "",
          user.phone || "",
          user.secretId || ""
        ].join(" ").toLowerCase();

        return text.includes(query);
      });

      if (!filteredUsers.length) {
        userList.innerHTML = '<div class="empty-note">No users found.</div>';
        return;
      }

      userList.innerHTML = filteredUsers.map((user, index) => {
        const originalIndex = users.findIndex(u =>
          u.email === user.email &&
          u.phone === user.phone &&
          u.secretId === user.secretId
        );

        return `
          <div class="user-card">
            <div class="user-top">
              <div>
                <div class="user-name">${escapeHtml((user.firstName || "") + " " + (user.middleName || "")).trim() || "Unnamed User"}</div>
                <div class="user-id">${escapeHtml(user.secretId || "No Secret ID")}</div>
              </div>
              <span class="tag">${(user.privacy || "Private Profile").toString()}</span>
            </div>

            <div class="user-meta"><strong>Email:</strong> ${escapeHtml(user.email || "")}</div>
            <div class="user-meta"><strong>Phone:</strong> ${escapeHtml(user.phone || "")}</div>
            <div class="user-meta"><strong>Password:</strong> ${escapeHtml(user.password || "")}</div>

            <div class="actions">
              <button class="btn btn-danger" type="button" onclick="deleteUser(${originalIndex})">Delete User</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function deleteUser(index) {
      const users = getUsers();
      if (!users[index]) return;

      const ok = confirm("Are you sure you want to delete this user?");
      if (!ok) return;

      users.splice(index, 1);
      saveUsers(users);
      updateStats();
      renderUsers();
      alert("User deleted.");
    }

    searchInput.addEventListener("input", renderUsers);

    logoutBtn.addEventListener("click", function() {
      localStorage.removeItem("msb_admin_logged_in");
      window.location.replace("admin-login.html");
    });

    refreshBtn.addEventListener("click", function() {
      updateStats();
      renderUsers();
    });

    clearSessionBtn.addEventListener("click", function() {
      localStorage.removeItem("loggedInUser");
      alert("Current logged in user session cleared.");
    });

    exportUsersBtn.addEventListener("click", function() {
      const users = getUsers();
      const blob = new Blob([JSON.stringify(users, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "my-secret-book-users.json";
      a.click();

      URL.revokeObjectURL(url);
    });

    updateStats();
    renderUsers();
  </script>
</body>
</html>
