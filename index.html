<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Secret Book</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at center, #f5e2c8, #3b2418);
  overflow: hidden;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 60px;
  margin-top: 120px;
  color: #7a3b22;
  text-shadow: 0 0 15px gold;
}

/* BOOK */
.book {
  width: 220px;
  height: 300px;
  background: #111;
  margin: 40px auto;
  border-radius: 10px;
  position: relative;
  transform: rotate(-15deg);
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% {transform: translateY(0) rotate(-15deg);}
  50% {transform: translateY(-20px) rotate(-15deg);}
}

/* NEXT BUTTON */
.btn {
  display: block;
  margin: 20px auto;
  padding: 10px 25px;
  background: #3b2418;
  color: #fff;
  border-radius: 8px;
  border: none;
}

/* SPARKLES */
.sparkle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: gold;
  border-radius: 50%;
  animation: sparkle 3s infinite;
}

@keyframes sparkle {
  0% {opacity: 0;}
  50% {opacity: 1;}
  100% {opacity: 0;}
}

/* PETALS */
.petal {
  position: absolute;
  width: 12px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  animation: fall 10s linear infinite;
}

@keyframes fall {
  0% {top: -10%;}
  100% {top: 110%;}
}
</style>
</head>

<body>

<h1 class="title">My Secret Book</h1>

<div class="book"></div>

<button class="btn">Next →</button>

<!-- Sparkles -->
<div class="sparkle" style="left:20%;top:40%;"></div>
<div class="sparkle" style="left:70%;top:50%;"></div>

<!-- Petals -->
<div class="petal" style="left:30%;"></div>
<div class="petal" style="left:60%;"></div>

</body>
</html>
