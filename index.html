<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Secret Book</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Left Menu -->
<div class="nav">
    <a href="#">Home</a>
    <a href="#" onclick="showAbout()">About</a>
    <a href="#" onclick="showLogin()">Login</a>
</div>

<h1 class="title">My Secret Book</h1>

<!-- Book Wrapper -->
<div class="book-wrapper">
    <div class="book" id="book">

        <!-- Page 1 -->
        <div class="page">
            <div class="front">Welcome 📖</div>
            <div class="back">This is Page 2</div>
        </div>

        <!-- Page 2 -->
        <div class="page">
            <div class="front">This is Page 3</div>
            <div class="back">This is Page 4</div>
        </div>

        <!-- Page 3 -->
        <div class="page">
            <div class="front">This is Page 5</div>
            <div class="back">The End ❤️</div>
        </div>

    </div>
</div>

<div class="controls">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
</div>

<!-- About -->
<div id="aboutBox" class="popup">
    <p>This is my secret book website 🌟</p>
    <select>
        <option>Hindi</option>
        <option>English</option>
        <option>Punjabi</option>
        <option>Bengali</option>
        <option>Gujarati</option>
        <option>Marathi</option>
        <option>Tamil</option>
        <option>Telugu</option>
        <option>Kannada</option>
        <option>Malayalam</option>
        <option>Odia</option>
        <option>Assamese</option>
        <option>Urdu</option>
        <option>Sanskrit</option>
    </select>
    <button onclick="closeBox()">Close</button>
</div>

<!-- Login -->
<div id="loginBox" class="popup">
    <h2>Login</h2>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <button>Login</button>
    <button onclick="closeBox()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
