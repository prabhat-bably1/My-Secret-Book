<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Secret Book</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button>Home</button>
    <button>About</button>
    <button>Login 📖</button>
</div>

<!-- TITLE + HANGING BOOK (UNCHANGED) -->
<div class="main">
    <h1 class="title">
    My Secret <br>
    <span class="book-text">Book</span>
</h1>

</div>
<!-- BOOK IMAGE -->
<div class="book-container">

    <div class="book" id="book">

        <!-- COVER -->
        <div class="cover">
            <img src="closed-book.png">
        </div>

        <!-- PAGE -->
        <div class="page" id="page">
            <h2>Welcome to your Secret World ✨</h2>
            <p>
                Start your journey here...<br>
                Share your thoughts, jokes, shayari and feelings 💛<br><br>
                This is your personal space —<br>
                stay happy and spread happiness ✨
            </p>
        </div>

    </div>

    <button class="next-btn" onclick="openBook()">Next ➜</button>

</div>
<script src="script.js"></script>
</body>
</html>
