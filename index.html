<!DOCTYPE html>
<html>
<head>
  <title>My Secret Book</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <h2>🔒 MySecretBook</h2>
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('about')">About</button>
    <button onclick="showPage('login')">Login</button>
    <select onchange="changeLanguage(this.value)">
  <option value="en">English</option>
  <option value="hi">Hindi</option>
  <option value="auto">🌍 Other</option>
    </select>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page">
  <h1>Welcome to My Secret Book 🔐</h1>
  <p>Your private notes, सुरक्षित और hidden.</p>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h1>About</h1>
  <p>This app lets you store secrets safely with password protection.</p>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h1>Login 🔐</h1>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Login</button>
</div>

<!-- APP -->
<div id="app" class="page">
  <h1>Your Secrets</h1>
  <textarea id="secretInput" placeholder="Write your secret..."></textarea>
  <button onclick="saveSecret()">Save</button>
  <ul id="secretList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
