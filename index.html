<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Secret Book</title>

<style>

/* BODY */
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f5efe6;
}

/* LEFT SIDEBAR */
.sidebar {
    width: 200px;
    height: 100vh;
    background: #cbb89d;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

.sidebar a {
    margin: 15px;
    padding: 10px 20px;
    background: white;
    border-radius: 20px;
    text-decoration: none;
    color: black;
}

/* MAIN AREA */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENT */
.container {
    text-align: center;
}

/* TITLE */
.title {
    font-size: 30px;
    font-family: cursive;
    color: #5d4037;
    margin-bottom: 15px;
}

/* IMAGE */
.container img {
    width: 90%;
    max-width: 400px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
}

.btn button {
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    background: #8d6e63;
    color: white;
    font-size: 16px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Login</a>
</div>

<!-- MAIN -->
<div class="main">
    <div class="container">

        <div class="title">My Secret Book</div>

    
        <img src="book.png.jpg" alt="book">

        <div class="btn">
            <button>Next →</button>
        </div>

    </div>
</div>

</body>
</html>
