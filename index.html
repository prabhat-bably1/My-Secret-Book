<!DOCTYPE html>
<html>
<head>
  <title>My Secret Book</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2>🔒 My Secret Book</h2>
  </div>

  <!-- Main Card -->
  <div class="container">
    <h1>Your Private Notes</h1>

    <textarea id="secretInput" placeholder="Write your secret..."></textarea>

    <button onclick="saveSecret()">Save Secret</button>

    <h3>Saved Secrets</h3>
    <ul id="secretList"></ul>
  </div>

  <!-- Lock Screen -->
  <div id="lockScreen">
    <h2>Enter Password 🔐</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
