<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Secret Book</title>

<style>

/* BODY */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    background-color: #f5efe6;
}

/* LEFT NAVBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background-color: #cbb89d;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

.sidebar a {
    text-decoration: none;
    color: black;
    margin: 15px 0;
    padding: 10px 20px;
    background: #eee;
    border-radius: 20px;
}

/* MAIN SECTION */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTAINER */
.book-container {
    text-align: center;
}

/* TITLE (BOOK KE UPAR) */
.book-title {
    font-size: 30px;
    font-family: cursive;
    color: #5d4037;
    margin-bottom: 10px;
}

/* BOOK IMAGE */
.book-container img {
    width: 90%;
    max-width: 400px;
}

/* NEXT BUTTON */
.next-btn {
    margin-top: 15px;
}

.next-btn button {
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    background-color: #8d6e63;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- LEFT SIDE NAVBAR -->
<div class="sidebar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Login</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="book-container">

        <!-- TITLE -->
        <div class="book-title">My Secret Book</div>

        <img src="book.png.jpg" alt="Book">

        <!-- BUTTON -->
        <div class="next-btn">
            <button>Next →</button>
        </div>

    </div>
</div>

</body>
</html>
